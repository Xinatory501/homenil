version: '3.8'

services:
  bot:
    build: .
    container_name: cartame_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      - redis
    networks:
      - cartame_network

  db:
    image: postgres:15-alpine
    container_name: cartame_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cartame
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - cartame_network

  redis:
    image: redis:7-alpine
    container_name: cartame_redis
    restart: unless-stopped
    networks:
      - cartame_network

volumes:
  postgres_data:

networks:
  cartame_network:
    driver: bridge
